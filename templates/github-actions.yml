name: Codexa Code Quality

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

jobs:
  codexa:
    runs-on: ubuntu-latest
    name: Code Quality Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Codexa
        run: npm install -g codexa

      - name: Install Python linters
        run: pip install ruff
        continue-on-error: true

      - name: Run Codexa check
        id: codexa
        run: |
          codexa check --ci --base main --all-files --output json > codexa-result.json 2>&1 || true
          cat codexa-result.json

      - name: Parse results
        id: parse
        run: |
          RESULT=$(jq -r '.result' codexa-result.json)
          BLOCKING=$(jq '.summary.blocking' codexa-result.json)
          WARNINGS=$(jq '.summary.warnings' codexa-result.json)
          FILES=$(jq '.summary.filesChecked' codexa-result.json)

          echo "result=$RESULT" >> $GITHUB_OUTPUT
          echo "blocking=$BLOCKING" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('codexa-result.json', 'utf8'));

            let icon = '✅';
            if (result.result === 'blocked') {
              icon = '❌';
            } else if (result.result === 'warned') {
              icon = '⚠️';
            }

            let comment = `## ${icon} Codexa Code Quality\n\n`;
            comment += `**Result:** ${result.result.toUpperCase()}\n`;
            comment += `**Blocking errors:** ${result.summary.blocking}\n`;
            comment += `**Warnings:** ${result.summary.warnings}\n`;
            comment += `**Files checked:** ${result.summary.filesChecked}\n\n`;

            if (result.blocking.length > 0) {
              comment += `### 🔴 Blocking Errors\n`;
              for (const err of result.blocking.slice(0, 10)) {
                comment += `- \`${err.file}:${err.line}\` — ${err.rule}: ${err.message}\n`;
              }
              if (result.blocking.length > 10) {
                comment += `- ... and ${result.blocking.length - 10} more\n`;
              }
              comment += '\n';
            }

            if (result.warnings.length > 0) {
              comment += `### 🟡 Warnings\n`;
              for (const err of result.warnings.slice(0, 5)) {
                comment += `- \`${err.file}:${err.line}\` — ${err.rule}\n`;
              }
              if (result.warnings.length > 5) {
                comment += `- ... and ${result.warnings.length - 5} more\n`;
              }
            }

            comment += `\n---\nGenerated by [Codexa](https://github.com/sayam-1705/codexa)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if blocked
        if: steps.parse.outputs.result == 'blocked'
        run: exit 1
